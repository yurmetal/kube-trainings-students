apiVersion: batch/v1
kind: CronJob
metadata:
  name: exxeta-cronjob
spec:
  schedule: "* * * * *"

  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: exxeta-cronjob
            image: busybox:1.28
            imagePullPolicy: IfNotPresent
            command:
          restartPolicy: OnFailure
